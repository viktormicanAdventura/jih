<!DOCTYPE html>
<html lang="cs">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Hádanka</title>

<style>

body {
    font-family: Arial, sans-serif;
    background: #f5f5f5;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
}

#box {
    background: white;
    padding: 30px;
    border-radius: 12px;
    box-shadow: 0 0 10px rgba(0,0,0,0.15);
    text-align: center;
    max-width: 700px;
    width: 90%;
}

h2 {
    margin-top: 0;
}

p {
    line-height: 1.6;
}

input {
    width: 80%;
    padding: 12px;
    margin-top: 15px;
    font-size: 16px;
}

button {
    width: 85%;
    padding: 12px;
    margin-top: 15px;
    font-size: 16px;
    cursor: pointer;
}

#error {
    color: red;
    margin-top: 15px;
    font-weight: bold;
}

</style>
</head>

<body>

<div id="box">

    <h2>🔐 Vyřeš hádanku</h2>

    <p>
        Hledáš řecky život.<br>
	Hledáš národní den tříkorunové země.<br>
	Koho hledáš?

    </p>

    <p><strong>Kam půjdeš?</strong></p>

    <input
        type="text"
        id="answer"
        placeholder="Napiš odpověď"
    >

    <br>

    <button onclick="check()">
        Odeslat
    </button>

    <div id="error"></div>

</div>

<script>

const input = document.getElementById("answer");

input.addEventListener("keydown", function(event) {

    if (event.key === "Enter") {
        check();
    }

});

function check() {

    const a = input.value
        .trim()
        .toLowerCase();

    if (a === "zoe") {

        window.location.href =
        "https://viktormicanadventura.github.io/jih/Mapa-1.png";

    } else {

        document.getElementById("error").innerText =
        "Špatná odpověď, zkus to znovu.";

    }
}

</script>

</body>
</html>
